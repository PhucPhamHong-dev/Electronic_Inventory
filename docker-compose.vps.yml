services:
  be:
    build:
      context: ./BE
    container_name: wms_be
    restart: unless-stopped
    env_file:
      - ./BE/.env
    environment:
      NODE_ENV: production
      PORT: 4100
    volumes:
      - ./BE/tmp/pdfs:/app/tmp/pdfs
      - ./BE/src/logs:/app/src/logs
    expose:
      - "4100"

  fe:
    build:
      context: ./FE
      args:
        VITE_API_BASE_URL: /api
    container_name: wms_fe
    restart: unless-stopped
    depends_on:
      - be
    ports:
      - "${WMS_HTTP_PORT:-8088}:80"
